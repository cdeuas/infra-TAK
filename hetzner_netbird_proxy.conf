# Nginx Configuration for Hetzner VPS (Proxy to Tactical-VM)
# Domain: netbird.solvato.io

server {
    listen 80;
    server_name netbird.solvato.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name netbird.solvato.io;

    # SSL managed by Certbot on Hetzner
    ssl_certificate /etc/letsencrypt/live/netbird.solvato.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netbird.solvato.io/privkey.pem;

    # NetBird Management API & Dashboard
    location / {
        proxy_pass http://localhost:8080; # Assumes SSH tunnel on port 8080
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # NetBird Signal Service (gRPC/WebSockets)
    location /signalexchange.SignalExchange/ {
        proxy_pass http://localhost:10000; # Assumes SSH tunnel on port 10000
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }
}
